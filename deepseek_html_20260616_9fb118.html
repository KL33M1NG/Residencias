<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Asistencia · Residentes · Guardia</title>
  <!-- Fuentes modernas -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 para iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #0b1721 0%, #1a2f3c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      position: relative;
    }

    /* Fondo decorativo suave */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 10%, rgba(99, 179, 237, 0.08) 0%, transparent 40%),
                  radial-gradient(circle at 80% 80%, rgba(56, 178, 172, 0.07) 0%, transparent 50%);
      pointer-events: none;
    }

    .dashboard {
      width: 100%;
      max-width: 1350px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      position: relative;
      z-index: 2;
    }

    /* ===== ENCABEZADO PRINCIPAL ===== */
    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .title-section h1 {
      font-size: 2.3rem;
      font-weight: 700;
      background: linear-gradient(to right, #e2e8f0, #b0c7db);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .title-section h1 i {
      background: rgba(56, 178, 172, 0.18);
      color: #4fd1c5;
      padding: 0.6rem;
      border-radius: 18px;
      font-size: 2rem;
      -webkit-text-fill-color: #4fd1c5;
      background: rgba(79, 209, 197, 0.15);
      backdrop-filter: blur(8px);
    }

    .date-badge {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 3rem;
      padding: 0.7rem 1.8rem;
      color: #cbd5e0;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1rem;
      box-shadow: 0 10px 25px -8px rgba(0,0,0,0.5);
    }

    .date-badge i {
      color: #f6ad55;
    }

    /* ===== TARJETAS PRINCIPALES ===== */
    .grid-panels {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 1.8rem;
      align-items: start;
    }

    @media (max-width: 950px) {
      .grid-panels {
        grid-template-columns: 1fr;
      }
    }

    /* ===== PANEL DE LISTADO ===== */
    .card {
      background: rgba(18, 30, 41, 0.7);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 2.2rem;
      padding: 1.8rem 1.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      transition: all 0.2s ease;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
    }

    .card-header h2 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      letter-spacing: -0.3px;
    }

    .badge-count {
      background: #2d4052;
      color: #cbd5e0;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      background: rgba(79, 209, 197, 0.12);
      border: 1px solid rgba(79, 209, 197, 0.3);
    }

    .residency-group {
      margin-bottom: 2rem;
    }

    .residency-title {
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #94a3b8;
      margin-bottom: 0.9rem;
      padding-left: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border-left: 3px solid #4fd1c5;
      padding-left: 0.9rem;
    }

    .resident-list {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .resident-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 1.2rem;
      padding: 0.75rem 1rem;
      transition: background 0.2s, border-color 0.2s;
      border: 1px solid transparent;
    }

    .resident-item:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .resident-info {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .resident-name {
      font-weight: 600;
      color: #f1f5f9;
      font-size: 0.98rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .resident-dni {
      font-size: 0.7rem;
      color: #7f8ea3;
      letter-spacing: 0.3px;
      font-weight: 500;
    }

    /* Checkbox personalizado */
    .checkbox-wrapper {
      display: flex;
      align-items: center;
    }

    .custom-checkbox {
      display: none;
    }

    .check-label {
      width: 1.9rem;
      height: 1.9rem;
      background: rgba(20, 30, 40, 0.8);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
      color: transparent;
      font-size: 1rem;
    }

    .custom-checkbox:checked + .check-label {
      background: #319795;
      border-color: #4fd1c5;
      color: white;
      box-shadow: 0 0 15px rgba(56, 178, 172, 0.5);
    }

    .check-label i {
      font-size: 0.9rem;
      transition: transform 0.15s;
    }

    .custom-checkbox:checked + .check-label i {
      transform: scale(1.1);
    }

    /* ===== PANEL LATERAL: PRESENTES HOY ===== */
    .side-panel {
      background: rgba(12, 22, 31, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 2.2rem;
      padding: 1.8rem 1.4rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.65);
      display: flex;
      flex-direction: column;
      gap: 1.3rem;
      max-height: 650px;
      overflow-y: auto;
    }

    .present-title {
      font-weight: 700;
      font-size: 1.4rem;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }

    .present-title i {
      color: #f6ad55;
    }

    .present-count {
      background: #2d3b4c;
      border-radius: 30px;
      padding: 0.2rem 1rem;
      font-size: 0.9rem;
      margin-left: 0.5rem;
      background: rgba(246, 173, 85, 0.15);
      color: #f6ad55;
    }

    .empty-message {
      color: #5f6f82;
      font-style: italic;
      text-align: center;
      padding: 2rem 1rem;
      background: rgba(255,255,255,0.02);
      border-radius: 1.2rem;
      font-size: 0.9rem;
    }

    .attendant-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: rgba(255,255,255,0.03);
      padding: 0.7rem 0.9rem;
      border-radius: 1rem;
      border-left: 4px solid #4fd1c5;
    }

    .attendant-name {
      font-weight: 600;
      color: #e2e8f0;
      flex: 1;
      font-size: 0.9rem;
    }

    .attendant-res {
      font-size: 0.7rem;
      color: #8b9bb5;
      background: rgba(79, 209, 197, 0.1);
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
    }

    .reset-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #b9c7da;
      padding: 0.7rem 1.2rem;
      border-radius: 2.5rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.7rem;
      font-size: 0.9rem;
    }

    .reset-btn:hover {
      background: rgba(255, 70, 70, 0.15);
      border-color: rgba(255, 100, 100, 0.4);
      color: #feb2b2;
    }

    hr {
      border-color: rgba(255,255,255,0.05);
      margin: 0.5rem 0;
    }

    @media (max-width: 600px) {
      body {
        padding: 0.8rem;
      }
      .card {
        padding: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Encabezado -->
    <div class="header">
      <div class="title-section">
        <h1>
          <i class="fas fa-stethoscope"></i> 
          Guardia Activa
        </h1>
      </div>
      <div class="date-badge">
        <i class="fas fa-calendar-alt"></i>
        <span id="currentDate"></span>
      </div>
    </div>

    <!-- Contenido: Listado + Panel lateral -->
    <div class="grid-panels">
      <!-- LISTA DE RESIDENTES -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-clipboard-list" style="color: #4fd1c5;"></i> Registro de asistencia</h2>
          <span class="badge-count" id="totalResidents">23 residentes</span>
        </div>
        <div id="residentsContainer">
          <!-- Se generará dinámicamente con JavaScript -->
        </div>
      </div>

      <!-- PANEL DE PRESENTES HOY -->
      <div class="side-panel">
        <div class="present-title">
          <i class="fas fa-user-check"></i> Presentes hoy
          <span class="present-count" id="presentCounter">0</span>
        </div>
        <div id="presentList" style="display: flex; flex-direction: column; gap: 0.7rem;">
          <div class="empty-message"><i class="far fa-clock"></i> Aún no hay asistentes marcados</div>
        </div>
        <hr>
        <button class="reset-btn" id="resetButton">
          <i class="fas fa-undo-alt"></i> Reiniciar lista
        </button>
        <div style="font-size: 0.7rem; color: #54657e; margin-top: 0.3rem; text-align: center;">
          <i class="fas fa-info-circle"></i> Los cambios se guardan en el navegador
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // --- DATOS DE RESIDENTES (provistos) ---
      const residentsData = [
        { apellidoNombre: "Álvarez Cavilla Luis", dni: "39.013.934", residencia: "Clínica Médica" },
        { apellidoNombre: "Cardoso Mara Daniela", dni: "39.015.492", residencia: "Clínica Médica" },
        { apellidoNombre: "Villegas Chaves Emilce", dni: "94.953.080", residencia: "Clínica Médica" },
        { apellidoNombre: "Torres Moyano José", dni: "94.905.020", residencia: "Clínica Médica" },
        { apellidoNombre: "Acosta Maribel", dni: "35.389.117", residencia: "Clínica Médica" },
        { apellidoNombre: "Palacios Lorena", dni: "38.202.348", residencia: "Clínica Médica" },
        { apellidoNombre: "Gil Orellana Camila", dni: "37.642.274", residencia: "Clínica Médica" },
        { apellidoNombre: "Chaile Dominguez Dayana", dni: "35.500.377", residencia: "Medicina Familiar" },
        { apellidoNombre: "Herrero Carla", dni: "37.204.733", residencia: "Terapia Intensiva" },
        { apellidoNombre: "Villafañez Walther", dni: "39.012.860", residencia: "Terapia Intensiva" },
        { apellidoNombre: "Zurita Agüero Daiana", dni: "37.168.081", residencia: "Cirugia General" },
        { apellidoNombre: "Sarmiento Lautaro", dni: "41.618.811", residencia: "Cirugia General" },
        { apellidoNombre: "Lencina Luciana", dni: "37.167.407", residencia: "Cirugia General" },
        { apellidoNombre: "Toloza Blanco Micaela", dni: "40.749.285", residencia: "Cirugia General" },
        { apellidoNombre: "Avellaneda Carlos", dni: "37.307.056", residencia: "Cirugia General" },
        { apellidoNombre: "Zalazar María Ángeles", dni: "37.089.290", residencia: "RISAM" },
        { apellidoNombre: "Carrizo Guillermo", dni: "38.762.461", residencia: "RISAM" },
        { apellidoNombre: "Gil Orellana Iris", dni: "36.504.513", residencia: "RISAM" },
        { apellidoNombre: "Juárez Fiama", dni: "38.485.630", residencia: "RISAM" },
        { apellidoNombre: "Córdoba Darío", dni: "30.676.398", residencia: "RISAM" },
        { apellidoNombre: "Álamo Jimena Nahir", dni: "36.854.034", residencia: "RISAM" },
        { apellidoNombre: "Rodríguez Abril", dni: "42.696.141", residencia: "RISAM" },
        { apellidoNombre: "Carmona Michelle", dni: "38.626.990", residencia: "RISAM" }
      ];

      // Clave para localStorage (por fecha o general)
      const STORAGE_KEY_PREFIX = "asistencia_residentes_";
      
      function getTodayKey() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        return `${STORAGE_KEY_PREFIX}${yyyy}-${mm}-${dd}`;
      }

      // Estado actual: Set de DNIs que están marcados como presentes
      let presentDNIs = new Set();

      // Referencias a elementos
      const residentsContainer = document.getElementById('residentsContainer');
      const presentListDiv = document.getElementById('presentList');
      const presentCounterSpan = document.getElementById('presentCounter');
      const totalResidentsSpan = document.getElementById('totalResidents');
      const resetButton = document.getElementById('resetButton');
      const currentDateSpan = document.getElementById('currentDate');

      // Mostrar fecha actual formateada
      function displayCurrentDate() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        currentDateSpan.textContent = now.toLocaleDateString('es-AR', options);
      }

      // Guardar estado en localStorage
      function saveState() {
        const key = getTodayKey();
        const dnisArray = Array.from(presentDNIs);
        localStorage.setItem(key, JSON.stringify(dnisArray));
      }

      // Cargar estado desde localStorage (según fecha de hoy)
      function loadState() {
        const key = getTodayKey();
        const stored = localStorage.getItem(key);
        if (stored) {
          try {
            const arr = JSON.parse(stored);
            presentDNIs = new Set(arr);
          } catch (e) {
            presentDNIs = new Set();
          }
        } else {
          presentDNIs = new Set();
        }
      }

      // Actualizar interfaz: checkboxes y panel de presentes
      function updateUI() {
        // Actualizar checkboxes según el estado actual
        const checkboxes = document.querySelectorAll('.resident-checkbox');
        checkboxes.forEach(cb => {
          const dni = cb.getAttribute('data-dni');
          if (presentDNIs.has(dni)) {
            cb.checked = true;
          } else {
            cb.checked = false;
          }
        });

        // Renderizar lista de presentes en panel lateral
        renderPresentList();
        // Actualizar contador de presentes
        presentCounterSpan.textContent = presentDNIs.size;
        // Total residentes (estático pero lo reflejamos)
        totalResidentsSpan.textContent = `${residentsData.length} residentes`;
      }

      // Renderizar lista de presentes en el panel
      function renderPresentList() {
        if (presentDNIs.size === 0) {
          presentListDiv.innerHTML = `<div class="empty-message"><i class="far fa-clock"></i> Aún no hay asistentes marcados</div>`;
          return;
        }

        // Buscar datos completos de los residentes presentes
        const presentes = residentsData.filter(r => presentDNIs.has(r.dni));
        
        let html = '';
        presentes.forEach(p => {
          html += `
            <div class="attendant-item">
              <span class="attendant-name">${p.apellidoNombre}</span>
              <span class="attendant-res">${p.residencia}</span>
            </div>
          `;
        });
        presentListDiv.innerHTML = html;
      }

      // Manejar cambio de checkbox
      function handleCheckboxChange(e) {
        const checkbox = e.target;
        const dni = checkbox.getAttribute('data-dni');
        if (!dni) return;

        if (checkbox.checked) {
          presentDNIs.add(dni);
        } else {
          presentDNIs.delete(dni);
        }

        saveState();
        updateUI(); // refresca panel y contadores
      }

      // Reiniciar todas las asistencias (limpiar el día)
      function resetAllAttendances() {
        if (presentDNIs.size === 0) {
          alert('No hay asistencias marcadas para reiniciar.');
          return;
        }
        if (confirm('¿Estás seguro de que deseas quitar todas las asistencias de hoy?')) {
          presentDNIs.clear();
          saveState();
          updateUI();
        }
      }

      // Agrupar residentes por residencia
      function groupByResidency(data) {
        const groups = {};
        data.forEach(resident => {
          const res = resident.residencia;
          if (!groups[res]) {
            groups[res] = [];
          }
          groups[res].push(resident);
        });
        return groups;
      }

      // Renderizar toda la lista de residentes agrupada
      function renderResidentList() {
        const grouped = groupByResidency(residentsData);
        const residencyOrder = ["Clínica Médica", "Medicina Familiar", "Terapia Intensiva", "Cirugia General", "RISAM"];
        
        let html = '';
        // Recorrer en orden deseado, y luego cualquier otra residencia que pudiera aparecer
        const orderedKeys = residencyOrder.filter(key => grouped[key]);
        const otherKeys = Object.keys(grouped).filter(key => !residencyOrder.includes(key));
        const allKeys = [...orderedKeys, ...otherKeys];

        allKeys.forEach(residencia => {
          const residents = grouped[residencia];
          html += `<div class="residency-group">`;
          html += `<div class="residency-title"><i class="fas fa-hospital-alt"></i> ${residencia}</div>`;
          html += `<div class="resident-list">`;
          
          residents.forEach(r => {
            const isChecked = presentDNIs.has(r.dni);
            html += `
              <div class="resident-item">
                <div class="resident-info">
                  <span class="resident-name"><i class="fas fa-user-circle" style="color: #7f8ea3; font-size: 0.9rem;"></i> ${r.apellidoNombre}</span>
                  <span class="resident-dni">DNI ${r.dni}</span>
                </div>
                <div class="checkbox-wrapper">
                  <input type="checkbox" id="chk-${r.dni}" class="custom-checkbox resident-checkbox" data-dni="${r.dni}" ${isChecked ? 'checked' : ''}>
                  <label for="chk-${r.dni}" class="check-label">
                    <i class="fas fa-check"></i>
                  </label>
                </div>
              </div>
            `;
          });
          
          html += `</div></div>`;
        });

        residentsContainer.innerHTML = html;

        // Agregar event listeners a todos los checkboxes
        document.querySelectorAll('.resident-checkbox').forEach(cb => {
          cb.addEventListener('change', handleCheckboxChange);
        });
      }

      // Inicialización completa
      function init() {
        displayCurrentDate();
        loadState();        // carga presentDNIs desde localStorage (según fecha)
        renderResidentList();
        updateUI();         // sincroniza checkboxes, panel presentes y contador

        // Evento botón reiniciar
        resetButton.addEventListener('click', resetAllAttendances);
      }

      // Arrancar cuando el DOM esté listo
      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
